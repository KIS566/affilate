<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Deals Bazaar • Premium Affiliate Hub</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    :root {
      --primary: #00bcd4;
      --primary-dark: #00838f;
      --accent: #ff6f00;
      --bg: #f5f7fa;
      --card-bg: #ffffff;
      --text: #2c3e50;
      --text-light: #5f6b7a;
      --border: #e8ecf1;
      --shadow: 0 6px 20px rgba(0,0,0,0.06);
      --shadow-hover: 0 14px 32px rgba(0,188,212,0.18);
      --radius: 18px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      font-family: 'Inter', 'Segoe UI', Roboto, system-ui, sans-serif;
      color: var(--text);
      line-height: 1.5;
    }

    .announcement-bar {
      background: linear-gradient(90deg, #1a1a2e, #16213e);
      color: #00e5ff;
      text-align: center;
      padding: 8px 16px;
      font-size: 0.82rem;
      font-weight: 600;
    }

    .main-header {
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(20px);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 14px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 12px rgba(0,0,0,0.03);
    }

    .logo-section {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo-circle {
      background: linear-gradient(135deg, #00bcd4, #00838f);
      width: 44px;
      height: 44px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 1.5rem;
      box-shadow: 0 6px 16px rgba(0,188,212,0.3);
    }
    .logo-text {
      font-size: 1.6rem;
      font-weight: 800;
      color: #1a1a2e;
    }
    .logo-text span { color: #00bcd4; }
    .logo-sub {
      font-size: 0.7rem;
      color: #7f8c8d;
      display: block;
      letter-spacing: 0.6px;
      text-transform: uppercase;
    }

    .search-wrapper {
      display: flex;
      align-items: center;
      background: #f1f4f9;
      border-radius: 40px;
      padding: 6px 6px 6px 18px;
      border: 1px solid #e0e5ec;
    }
    .search-wrapper input {
      border: none;
      background: transparent;
      padding: 8px 6px;
      font-size: 0.9rem;
      width: 200px;
      outline: none;
    }
    .search-wrapper button {
      background: #00bcd4;
      border: none;
      color: white;
      border-radius: 30px;
      padding: 9px 18px;
      cursor: pointer;
      font-weight: 600;
    }

    .category-strip {
      background: white;
      padding: 12px 24px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 72px;
      z-index: 90;
    }
    .cat-pill {
      padding: 8px 18px;
      border-radius: 30px;
      font-weight: 600;
      font-size: 0.82rem;
      cursor: pointer;
      background: #f1f4f9;
      border: 1px solid transparent;
      transition: 0.2s;
      white-space: nowrap;
    }
    .cat-pill.active {
      background: #e0f7fa;
      color: #00838f;
      border-color: #00bcd4;
    }

    .deals-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
      padding: 20px 24px;
      max-width: 1350px;
      margin: 0 auto;
    }

    .deal-card {
      background: var(--card-bg);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
      transition: all 0.28s;
      display: flex;
      flex-direction: column;
      border: 1px solid var(--border);
    }
    .deal-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-hover);
      border-color: #b2ebf2;
    }

    .card-img-wrap {
      position: relative;
      height: 200px;
      background: #eef2f6;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card-img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.5s;
    }
    .deal-card:hover .card-img-wrap img { transform: scale(1.05); }
    .img-fallback {
      font-size: 4.5rem;
      color: #b0bec5;
      opacity: 0.6;
    }

    .platform-chip {
      position: absolute;
      top: 12px;
      left: 12px;
      background: rgba(26,26,46,0.82);
      backdrop-filter: blur(8px);
      color: white;
      padding: 5px 14px;
      border-radius: 30px;
      font-size: 0.7rem;
      font-weight: 700;
      z-index: 4;
    }
    .discount-chip {
      position: absolute;
      top: 12px;
      right: 12px;
      background: linear-gradient(135deg, #ff8f00, #e65100);
      color: white;
      padding: 5px 12px;
      border-radius: 30px;
      font-weight: 800;
      font-size: 0.72rem;
      z-index: 4;
    }

    .card-body {
      padding: 14px 16px 16px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    .deal-title {
      font-weight: 700;
      font-size: 1rem;
      color: #1a1a2e;
      margin-bottom: 6px;
    }
    .deal-desc {
      font-size: 0.8rem;
      color: #7f8c8d;
      margin-bottom: 10px;
    }
    .price-row {
      display: flex;
      align-items: baseline;
      gap: 8px;
      margin: 6px 0 14px;
    }
    .price-current {
      font-size: 1.55rem;
      font-weight: 800;
      color: #00838f;
    }
    .price-old {
      font-size: 0.9rem;
      color: #a0aec0;
      text-decoration: line-through;
    }
    .buy-btn {
      background: linear-gradient(135deg, #00bcd4, #00838f);
      color: white;
      padding: 11px 16px;
      border-radius: 30px;
      font-weight: 700;
      text-align: center;
      text-decoration: none;
      margin-top: auto;
      transition: 0.25s;
      box-shadow: 0 6px 16px rgba(0,188,212,0.3);
    }
    .buy-btn:hover {
      background: linear-gradient(135deg, #0097a7, #006064);
    }

    .state-full {
      grid-column: 1 / -1;
      text-align: center;
      padding: 3rem;
      background: white;
      border-radius: 24px;
    }
    .spinner {
      font-size: 2.5rem;
      color: #00bcd4;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .site-footer {
      text-align: center;
      padding: 18px;
      color: #95a5a6;
      font-size: 0.78rem;
      border-top: 1px solid var(--border);
    }
  </style>
</head>
<body>

  <div class="announcement-bar">
    <i class="fas fa-bolt"></i> 🔥 Mega Sale Live – Up to 70% Off <i class="fas fa-bolt"></i>
  </div>

  <header class="main-header">
    <div class="logo-section">
      <div class="logo-circle"><i class="fas fa-bolt"></i></div>
      <div>
        <div class="logo-text">Deals<span>Bazar</span></div>
        <span class="logo-sub">Affiliate Store</span>
      </div>
    </div>
    <div class="search-wrapper">
      <input type="text" placeholder="Search deals..." id="searchInput">
      <button id="searchBtn"><i class="fas fa-search"></i> Search</button>
    </div>
  </header>

  <div class="category-strip" id="categoryStrip">
    <span class="cat-pill active" data-cat="all">🔥 All Deals</span>
    <span class="cat-pill" data-cat="amazon"><i class="fab fa-amazon"></i> Amazon</span>
    <span class="cat-pill" data-cat="flipkart"><i class="fas fa-shopping-bag"></i> Flipkart</span>
    <span class="cat-pill" data-cat="meesho">📦 Meesho</span>
    <span class="cat-pill" data-cat="myntra">👗 Myntra</span>
    <span class="cat-pill" data-cat="other">🛍️ Others</span>
    <span class="cat-pill" data-cat="bigdiscount">🏷️ 40%+ Off</span>
  </div>

  <main>
    <div class="deals-grid" id="dealsGrid">
      <div class="state-full">
        <div class="spinner"><i class="fas fa-circle-notch"></i></div>
        <h3>Loading Hot Deals...</h3>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    © DealsBazar — Curated affiliate offers. | <a href="admin.html" style="color:#00bcd4;">Admin</a>
  </footer>

  <script>
    (function() {
      // ✅ DIRECTLY FETCH FROM GITHUB RAW JSON
      const JSON_URL = 'https://raw.githubusercontent.com/kis566/Dealsbazar/main/products.json';
      
      let allProducts = [];
      let activeCategory = 'all';

      window.imgFallback = function(img) {
        const wrap = img.closest('.card-img-wrap');
        if (!wrap) return;
        img.style.display = 'none';
        if (wrap.querySelector('.img-fallback')) return;
        const fb = document.createElement('div');
        fb.className = 'img-fallback';
        fb.innerHTML = '<i class="fas fa-gift"></i>';
        wrap.appendChild(fb);
      };

      const esc = str => String(str || '').replace(/[&<>"']/g, m => ({
        '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'
      }[m]));

      const sval = (v, d='') => v ? String(v).trim() : d;

      function render(products) {
        const grid = document.getElementById('dealsGrid');
        if (!products.length) {
          grid.innerHTML = `<div class="state-full"><h3>📭 No deals found</h3></div>`;
          return;
        }

        grid.innerHTML = products.map(item => {
          const title = esc(sval(item.title, 'Best Deal'));
          const desc = esc(sval(item.description, ''));
          const platform = esc(sval(item.platform, 'Store'));
          const price = sval(item.price, '299').replace(/[^\d.]/g, '') || '299';
          const oldPrice = sval(item.oldPrice, '').replace(/[^\d.]/g, '');
          const discount = esc(sval(item.discount, ''));
          const imgUrl = sval(item.image, '');
          const link = esc(sval(item.link, '#'));
          const hasImg = imgUrl && (imgUrl.startsWith('http'));

          const imgHTML = hasImg
            ? `<img src="${imgUrl}" alt="${title}" loading="lazy" onerror="imgFallback(this)">`
            : `<div class="img-fallback"><i class="fas fa-image"></i></div>`;

          const platIcon = platform.toLowerCase().includes('amazon') ? 'fab fa-amazon' : 'fas fa-store';
          const discHTML = discount ? `<span class="discount-chip">${discount}</span>` : '';
          const showOld = oldPrice && oldPrice !== price;

          return `
            <div class="deal-card">
              <div class="card-img-wrap">
                <span class="platform-chip"><i class="${platIcon}"></i> ${platform}</span>
                ${discHTML}
                ${imgHTML}
              </div>
              <div class="card-body">
                <div class="deal-title">${title}</div>
                ${desc ? `<div class="deal-desc">${desc.substring(0,75)}</div>` : ''}
                <div class="price-row">
                  <span class="price-current">₹${price}</span>
                  ${showOld ? `<span class="price-old">₹${oldPrice}</span>` : ''}
                </div>
                <a href="${link}" target="_blank" rel="noopener" class="buy-btn">
                  <i class="fas fa-shopping-cart"></i> View Deal
                </a>
              </div>
            </div>`;
        }).join('');
      }

      function filterAndRender() {
        let filtered = [...allProducts];
        const searchTerm = document.getElementById('searchInput')?.value.trim().toLowerCase() || '';

        if (activeCategory === 'amazon') filtered = filtered.filter(p => sval(p.platform).toLowerCase().includes('amazon'));
        else if (activeCategory === 'flipkart') filtered = filtered.filter(p => sval(p.platform).toLowerCase().includes('flipkart'));
        else if (activeCategory === 'meesho') filtered = filtered.filter(p => sval(p.platform).toLowerCase().includes('meesho'));
        else if (activeCategory === 'myntra') filtered = filtered.filter(p => sval(p.platform).toLowerCase().includes('myntra'));
        else if (activeCategory === 'other') filtered = filtered.filter(p => {
          const plat = sval(p.platform).toLowerCase();
          return !['amazon','flipkart','meesho','myntra'].some(k => plat.includes(k));
        });
        else if (activeCategory === 'bigdiscount') filtered = filtered.filter(p => {
          const d = sval(p.discount).replace(/[^\d]/g, '');
          return d && parseInt(d) >= 40;
        });

        if (searchTerm) {
          filtered = filtered.filter(p =>
            sval(p.title).toLowerCase().includes(searchTerm) ||
            sval(p.description).toLowerCase().includes(searchTerm)
          );
        }

        render(filtered.reverse());
      }

      document.getElementById('categoryStrip').addEventListener('click', e => {
        if (e.target.classList.contains('cat-pill')) {
          document.querySelectorAll('.cat-pill').forEach(c => c.classList.remove('active'));
          e.target.classList.add('active');
          activeCategory = e.target.dataset.cat;
          filterAndRender();
        }
      });

      document.getElementById('searchBtn').addEventListener('click', filterAndRender);
      document.getElementById('searchInput').addEventListener('keypress', e => {
        if (e.key === 'Enter') filterAndRender();
      });

      // 🔥 MAIN CHANGE: Fetch from GitHub Raw JSON
      async function init() {
        try {
          console.log('📡 Fetching from GitHub...');
          const res = await fetch(JSON_URL);
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const data = await res.json();
          
          allProducts = Array.isArray(data) ? data.filter(p => p && p.title) : [];
          console.log(`✅ Loaded ${allProducts.length} products from GitHub`);
          
          filterAndRender();
        } catch (err) {
          console.error('❌ Error:', err);
          document.getElementById('dealsGrid').innerHTML = `
            <div class="state-full">
              <h3>⚠️ Failed to load</h3>
              <p>${err.message}</p>
            </div>`;
        }
      }

      init();
    })();
  </script>
</body>
</html>
